<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Security Lab Dashboard</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #0f1117;
      color: #ffffff;
    }

    h1 { color: #00ff88; }
    h2 { margin-top: 30px; color: #ffffff; }

    button {
      padding: 10px 15px;
      background: #00ff88;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 10px;
    }

    button:hover { background: #00cc6a; }

    .alert {
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    .HIGH { background: #7a3d00; border-left: 6px solid orange; }
    .MEDIUM { background: #665500; border-left: 6px solid yellow; }
    .CRITICAL { background: #8b0000; border-left: 6px solid red; }

    .info {
      background: #1a1d24;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
      white-space: pre-wrap;
      color: #cfcfcf;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #1a1d24;
    }

    th, td {
      border: 1px solid #333;
      padding: 8px;
      font-size: 14px;
    }

    th { background: #222; color: #00ff88; }
    tr:nth-child(even) { background: #16181f; }
  </style>
</head>

<body>
  <h1>🛡 AI Security Lab Dashboard</h1>

  <h2>🧠 AI System Overview</h2>
  <button onclick="loadAISummary()">Generate AI Summary</button>
  <div id="aiSummary" class="info"></div>

  <h2>🚨 Alerts</h2>
  <div id="alerts"></div>

  <h2>📜 Logs</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Device</th>
        <th>Event</th>
        <th>User</th>
        <th>IP</th>
        <th>Timestamp</th>
      </tr>
    </thead>
    <tbody id="logs"></tbody>
  </table>

  <script>
    // IMPORTANT: treat all server/LLM output as plain text.
    function safeText(v) {
      return document.createTextNode(v == null ? "" : String(v));
    }

    async function loadLogs() {
      const res = await fetch("/logs");
      const data = await res.json();

      const table = document.getElementById("logs");
      table.innerHTML = "";

      data.forEach(log => {
        const tr = document.createElement("tr");

        const tdId = document.createElement("td"); tdId.appendChild(safeText(log.id)); tr.appendChild(tdId);
        const tdDevice = document.createElement("td"); tdDevice.appendChild(safeText(log.device)); tr.appendChild(tdDevice);
        const tdEvent = document.createElement("td"); tdEvent.appendChild(safeText(log.event_type)); tr.appendChild(tdEvent);
        const tdUser = document.createElement("td"); tdUser.appendChild(safeText(log.username)); tr.appendChild(tdUser);
        const tdIp = document.createElement("td"); tdIp.appendChild(safeText(log.ip_address)); tr.appendChild(tdIp);
        const tdTs = document.createElement("td"); tdTs.appendChild(safeText(log.timestamp)); tr.appendChild(tdTs);

        table.appendChild(tr);
      });
    }

    async function loadAlerts() {
      const res = await fetch("/alerts");
      const data = await res.json();

      const container = document.getElementById("alerts");
      container.innerHTML = "";

      data.forEach(alert => {
        const alertEl = document.createElement("div");
        alertEl.className = `alert ${alert.severity}`;

        const title = document.createElement("h3");
        title.appendChild(safeText(alert.type));
        alertEl.appendChild(title);

        const pSev = document.createElement("p"); pSev.innerHTML = "<b>Severity:</b>"; pSev.appendChild(safeText(` ${alert.severity || ""}`)); alertEl.appendChild(pSev);
        const pDev = document.createElement("p"); pDev.innerHTML = "<b>Device:</b>"; pDev.appendChild(safeText(` ${alert.device || "N/A"}`)); alertEl.appendChild(pDev);
        const pIp = document.createElement("p"); pIp.innerHTML = "<b>IP:</b>"; pIp.appendChild(safeText(` ${alert.ip_address || "N/A"}`)); alertEl.appendChild(pIp);
        const pCount = document.createElement("p"); pCount.innerHTML = "<b>Count:</b>"; pCount.appendChild(safeText(` ${alert.count || "N/A"}`)); alertEl.appendChild(pCount);

        const info = document.createElement("div");
        info.className = "info";

        const label = document.createElement("div");
        label.innerHTML = "<b>AI Analysis:</b><br/>";
        info.appendChild(label);

        const analysisText = document.createElement("div");
        analysisText.appendChild(safeText(alert.analysis || "No analysis yet"));
        info.appendChild(analysisText);

        alertEl.appendChild(info);
        container.appendChild(alertEl);
      });
    }

    async function loadAISummary() {
      const res = await fetch("/ai/summary");
      const data = await res.json();

      // plain text only
      document.getElementById("aiSummary").textContent = data.summary || "";
    }

    function refresh() {
      loadLogs();
      loadAlerts();
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
