<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Security Lab Dashboard</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #0f1117;
      color: #ffffff;
    }

    h1 {
      color: #00ff88;
    }

    h2 {
      margin-top: 30px;
      color: #ffffff;
    }

    button {
      padding: 10px 15px;
      background: #00ff88;
      border: none;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 10px;
    }

    button:hover {
      background: #00cc6a;
    }

    .alert {
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    .HIGH {
      background: #7a3d00;
      border-left: 6px solid orange;
    }

    .MEDIUM {
      background: #665500;
      border-left: 6px solid yellow;
    }

    .CRITICAL {
      background: #8b0000;
      border-left: 6px solid red;
    }

    .info {
      background: #1a1d24;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
      white-space: pre-wrap;
      color: #cfcfcf;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #1a1d24;
    }

    th, td {
      border: 1px solid #333;
      padding: 8px;
      font-size: 14px;
    }

    th {
      background: #222;
      color: #00ff88;
    }

    tr:nth-child(even) {
      background: #16181f;
    }
  </style>
</head>

<body>

  <h1>🛡 AI Security Lab Dashboard</h1>

  <h2>🧠 AI System Overview</h2>
  <button onclick="loadAISummary()">Generate AI Summary</button>
  <div id="aiSummary" class="info"></div>

  <h2>🚨 Alerts</h2>
  <div id="alerts"></div>

  <h2>📜 Logs</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Device</th>
        <th>Event</th>
        <th>User</th>
        <th>IP</th>
        <th>Timestamp</th>
      </tr>
    </thead>
    <tbody id="logs"></tbody>
  </table>

  <script>

    async function loadLogs() {
      const res = await fetch("/logs");
      const data = await res.json();

      const table = document.getElementById("logs");
      table.innerHTML = "";

      data.forEach(log => {
        table.innerHTML += `
          <tr>
            <td>${log.id}</td>
            <td>${log.device}</td>
            <td>${log.event_type}</td>
            <td>${log.username}</td>
            <td>${log.ip_address}</td>
            <td>${log.timestamp}</td>
          </tr>
        `;
      });
    }

    async function loadAlerts() {
      const res = await fetch("/alerts");
      const data = await res.json();

      const container = document.getElementById("alerts");
      container.innerHTML = "";

      data.forEach(alert => {

        container.innerHTML += `
          <div class="alert ${alert.severity}">
            <h3>${alert.type}</h3>

            <p><b>Severity:</b> ${alert.severity}</p>
            <p><b>Device:</b> ${alert.device || "N/A"}</p>
            <p><b>IP:</b> ${alert.ip_address || "N/A"}</p>
            <p><b>Count:</b> ${alert.count || "N/A"}</p>

            <div class="info">
              <b>AI Analysis:</b><br/>
              ${alert.analysis || "No analysis yet"}
            </div>
          </div>
        `;
      });
    }

    async function loadAISummary() {
      const res = await fetch("/ai/summary");
      const data = await res.json();

      document.getElementById("aiSummary").innerText =
        data.summary;
    }

    function refresh() {
      loadLogs();
      loadAlerts();
    }

    refresh();
    setInterval(refresh, 5000);

  </script>

</body>
</html>
